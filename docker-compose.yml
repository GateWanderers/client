services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gw-postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-gatewanderers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       ${POSTGRES_DB:-gatewanderers}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gatewanderers} -d ${POSTGRES_DB:-gatewanderers}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  # ── Game Server ─────────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gw-server
    env_file: .env
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-gatewanderers}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gatewanderers}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"   # only localhost; nginx proxies externally
    restart: unless-stopped
    networks:
      - internal
      - external

  # ── nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: gw-nginx
    volumes:
      - ./nginx/gatewanderers.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro    # optional TLS certs
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - external

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
    internal: true    # postgres not reachable from outside
  external:
    driver: bridge

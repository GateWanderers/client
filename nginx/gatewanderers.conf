# GateWanderers — nginx reverse proxy config
# Supports HTTP (port 80) and optional HTTPS (port 443 with TLS certs).
# WebSocket upgrade for /stream is handled via the map section below.

upstream gw_server {
    server server:8080;
    keepalive 32;
}

# ── Redirect HTTP → HTTPS (enable when TLS is configured) ───────────────────
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# ── Main server block ────────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl;
    server_name _;

    # TLS certificates (generated by Certbot or placed manually).
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    # Sane defaults.
    client_max_body_size  1m;
    keepalive_timeout     65;
    gzip on;
    gzip_types text/html application/json text/css application/javascript;

    # Security headers.
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # ── WebSocket — /stream ──────────────────────────────────────────────────
    location /stream {
        proxy_pass         http://gw_server;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;   # keep WS connection alive for 1 hour
        proxy_send_timeout 3600s;
    }

    # ── All other requests ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://gw_server;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }
}

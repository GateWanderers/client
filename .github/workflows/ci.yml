name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gw
          POSTGRES_PASSWORD: gw
          POSTGRES_DB: gatewanderers_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: go vet
        working-directory: server
        run: go vet ./...

      - name: go build
        working-directory: server
        run: go build ./...

      - name: go test
        working-directory: server
        env:
          DATABASE_URL: postgres://gw:gw@localhost:5432/gatewanderers_test?sslmode=disable
        run: go test ./... -timeout 60s

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (no push)
        run: docker build -t gatewanderers-server:ci .
